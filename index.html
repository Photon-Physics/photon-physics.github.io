<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Photon Physics - Learn Smart</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }
    header {
      background: #007BFF;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 24px;
    }
    .filter {
      margin: 20px 0;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .card {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      padding: 15px;
      margin: 10px 0;
    }
    iframe {
      width: 100%;
      height: 300px;
    }
  </style>
</head>
<body>

<header>Photon Physics</header>

<div class="filter">
  <select id="yearFilter">
    <option value="">Select Year</option>
  </select>

  <select id="classFilter">
    <option value="">Select Class</option>
  </select>
</div>

<div id="content"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBBwpd0Z1T5elVhFZwNr8MJB2YKeUPeRYU",
    authDomain: "photonphysics-1254.firebaseapp.com",
    databaseURL: "https://photonphysics-1254-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "photonphysics-1254",
    storageBucket: "photonphysics-1254.appspot.com",
    messagingSenderId: "196923024550",
    appId: "1:196923024550:web:282330f9ee5e77d62dc067"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const yearFilter = document.getElementById('yearFilter');
  const classFilter = document.getElementById('classFilter');
  const content = document.getElementById('content');

  function loadData() {
    db.ref('lectures').once('value', snapshot => {
      const data = snapshot.val();
      const years = new Set();
      const classes = new Set();
      content.innerHTML = '';

      for (let id in data) {
        years.add(data[id].year);
        classes.add(data[id].class);
      }

      yearFilter.innerHTML = '<option value="">Select Year</option>';
      years.forEach(y => {
        yearFilter.innerHTML += `<option value="${y}">${y}</option>`;
      });

      classFilter.innerHTML = '<option value="">Select Class</option>';
      classes.forEach(c => {
        classFilter.innerHTML += `<option value="${c}">${c}</option>`;
      });

      renderData(data);
    });
  }

  function renderData(data) {
    content.innerHTML = '';
    for (let id in data) {
      if ((yearFilter.value === '' || data[id].year === yearFilter.value) &&
          (classFilter.value === '' || data[id].class === classFilter.value)) {
        const item = data[id];
        content.innerHTML += `
          <div class="card">
            <h3>${item.chapter}</h3>
            <iframe src="https://www.youtube.com/embed/${extractYouTubeID(item.video)}" frameborder="0" allowfullscreen></iframe>
            <p><a href="${item.notes}" target="_blank">Download Notes (PDF)</a></p>
            <p><a href="${item.assignment}" target="_blank">Download Assignment</a></p>
          </div>
        `;
      }
    }
  }

  function extractYouTubeID(url) {
    const regExp = /(?:youtube\.com.*(?:\?v=|\/embed\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/;
    const match = url.match(regExp);
    return match ? match[1] : url;
  }

  yearFilter.addEventListener('change', () => loadData());
  classFilter.addEventListener('change', () => loadData());

  loadData();
</script>

</body>
</html>
